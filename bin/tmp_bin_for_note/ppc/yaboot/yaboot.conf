## yaboot.conf generated by debian-installer
##
## run: "man yaboot.conf" for details. Do not make changes until you have!!
## see also: /usr/share/doc/yaboot/examples for example configurations.
##
## For a dual-boot menu, add one or more of:
## bsd=/dev/hdaX, macos=/dev/hdaY, macosx=/dev/hdaZ

boot="/dev/disk/by-id/ata-WDC_WD3200BEVE-00A0HT0_WD-WXJ1A8192139-part2"
device=/pci@f4000000/ata-6@d/@0
partition=4
root="UUID=6fcbe74d-622e-4fd3-a2b5-7c6d6d056816"

timeout=100

install=/usr/lib/yaboot/yaboot
magicboot=/usr/lib/yaboot/ofboot

enablecdboot
enableofboot
brokenosx

macos="/dev/disk/by-id/ata-WDC_WD3200BEVE-00A0HT0_WD-WXJ1A8192139-part10"
#macosx="/dev/disk/by-id/ata-WDC_WD3200BEVE-00A0HT0_WD-WXJ1A8192139-part9"
macosx="/dev/disk/by-id/ata-WDC_WD3200BEVE-00A0HT0_WD-WXJ1A8192139-part8"
## morphos="/dev/disk/by-id/ata-WDC_WD3200BEVE-00A0HT0_WD-WXJ1A8192139-part1"
## amigaos="/dev/disk/by-id/ata-WDC_WD3200BEVE-00A0HT0_WD-WXJ1A8192139-part2"

image=/boot/vmlinux-5.16.0+
	label=Linux
	read-only
	initrd=/boot/initrd.img-5.16.0+
	append""

image=/boot/vmlinux-5.15.0-2-powerpc
	label=old
	read-only
	initrd=/boot/initrd.img-5.15.0-2-powerpc
	append""
#append="video=offb:off video=radeonfb:off radeon.agpmode=-1"

## append="radeon.agpmode=-1 radeon.modeset=1 video=radeonfb:1280x600 video=offb:off"

image=/boot/vmlinux-5.15.0-2-powerpc
        label=exp
        read-only
	initrd=/boot/initrd.img-5.15.0-2-powerpc
        append="mitigations=off"

image=/boot/vmlinux
        label=rescue
        read-only
        initrd=/boot/initrd.img
        append="single"

image=/boot/vmlinux.old
	label=older
	read-only
	initrd=/boot/initrd.img.old
        append="video=offb:off video=radeonfb:off radeon.agpmode=-1"

image=/boot/vmlinux.old
        label=new
        read-only
        initrd=/boot/initrd.img.old
        append=""

