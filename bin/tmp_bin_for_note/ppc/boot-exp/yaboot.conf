## yaboot.conf generated by debian-installer
##
## run: "man yaboot.conf" for details. Do not make changes until you have!!
## see also: /usr/share/doc/yaboot/examples for example configurations.
##
## For a dual-boot menu, add one or more of:
## bsd=/dev/hdaX, macos=/dev/hdaY, macosx=/dev/hdaZ

## boot="/dev/disk/by-id/scsi-SATA_WDC_WD3200BEVE-_WD-WXJ1A8192139-part2"
boot="/dev/disk/by-id/ata-WDC_WD3200BEVE-00A0HT0_WD-WXJ1A8192139-part2"
device=/pci@f4000000/ata-6@d/@0

partition=4
root="UUID=ce85db27-77b5-470a-b9d5-c8a6caf6962a"

timeout=100

install=/usr/lib/yaboot/yaboot
magicboot=/usr/lib/yaboot/ofboot

enableofboot
enablecdboot

## macos="/dev/disk/by-id/scsi-SATA_WDC_WD3200BEVE-_WD-WXJ1A8192139-part10"
macos="/dev/disk/by-id/ata-WDC_WD3200BEVE-00A0HT0_WD-WXJ1A8192139-part10"
Morphos="/dev/disk/by-id/ata-WDC_WD3200BEVE-00A0HT0_WD-WXJ1A8192139-part3"

image=/boot/vmlinux.new
	label=Linux
	read-only
	initrd=/boot/initrd.img.new

image=/boot/vmlinux
	label=old
	read-only
	initrd=/boot/initrd.img
	root = /dev/sda4
